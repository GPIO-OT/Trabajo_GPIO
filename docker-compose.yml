services:
  frontend:
    build: ./Frontend
    image: frontend-image
    ports:
      - "5002:3000"
    depends_on:
      - backend

  backend:
    build: ./Backend
    image: backend-image
    ports:
      - "5001:5000"
    environment:
      MYSQL_USER: root
      MYSQL_PASSWORD: sergio2525
      MYSQL_DATABASE: OT_BD
      MYSQL_HOST: db
    depends_on:
      db:
        condition: service_healthy
  kong:
    image: kong/kong-gateway:3.13
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong.yml:/kong/declarative/kong.yml
    depends_on:
      - backend

  db:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: sergio2525
      MYSQL_DATABASE: OT_BD
    ports:
      - 3307:3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
